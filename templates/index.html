<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aimos - Ambient Vibe Controller</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --text-color: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", sans-serif;
        color: var(--text-color);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        overflow: hidden;
        position: relative;
      }

      .glass-container {
        width: 350px;
        height: 600px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 30px;
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-top: 10px;
      }

      .vibe-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 20px;
        margin-top: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
      }

      .vibe-content {
        text-align: left;
        margin: 20px 0;
      }

      .vibe-content .label {
        font-size: 1.1rem;
        margin-bottom: 5px;
        opacity: 0.7;
      }

      .vibe-content h2 {
        font-size: 2.2rem;
        margin: 0;
        line-height: 1.2;
      }

      .spotify-widget {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
      }

      #album-art {
        width: 50px;
        height: 50px;
        border-radius: 8px;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.8s ease;
      }

      .track-info {
        text-align: left;
        font-size: 0.8rem;
        overflow: hidden;
      }

      .track-info p {
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #playlist-name {
        font-weight: 600;
        margin-bottom: 2px;
      }

      .spotify-icon {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 15px;
        opacity: 0.6;
      }

      .controls {
        margin-top: 30px;
      }

      .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 15px;
      }

      .power-btn {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s ease;
        border: none;
        color: white;
      }

      .power-btn.off {
        background-color: #1a1a1a;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .power-btn.on {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 1;
      }

      .power-btn.on::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        bottom: -2px;
        right: -2px;
        background: linear-gradient(
          45deg,
          #ff0000,
          #ff7f00,
          #ffff00,
          #00ff00,
          #0000ff,
          #4b0082,
          #9400d3
        );
        border-radius: 14px;
        z-index: -1;
        opacity: 0.5;
        filter: blur(4px);
        transition: opacity 0.3s ease;
      }

      .power-btn:active {
        transform: scale(0.96);
      }

      .system-status {
        margin-top: 15px;
        font-size: 0.7rem;
        opacity: 0.6;
      }

      #status-dot {
        color: #666;
        transition: color 0.5s ease;
      }

      .swiper {
        width: 100%;
        height: 380px;
        margin-top: 20px;
      }

      .swiper-slide {
        opacity: 0.4;
        width: 280px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-sizing: border-box;
      }

      .swiper-slide-active {
        opacity: 1 !important;
        filter: blur(0px) !important;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.1); /* 手前だけ少し光らせる */
      }

      .vibe-card {
        background: transparent !important;
        margin-top: 0 !important;
        padding: 20px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="power-overlay"></div>
    <div class="glass-container">
      <header>
        <h1>Aimos</h1>
      </header>

      <div class="vibe-display" style="padding: 10px 0">
        <h2
          id="vibe-name"
          style="font-size: 1.2rem; font-weight: 300; margin: 0"
        >
          Ready
        </h2>

        <div
          class="spotify-widget"
          style="
            margin: 15px auto;
            width: 80%;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
          "
        >
          <img
            id="album-art"
            src=""
            style="
              width: 40px;
              height: 40px;
              border-radius: 4px;
              opacity: 0;
              transition: opacity 0.5s;
            "
          />
          <div style="text-align: left; font-size: 0.7rem; overflow: hidden">
            <p id="playlist-name" style="margin: 0; font-weight: 600">
              Standby
            </p>
            <p id="track-details" style="margin: 0; opacity: 0.7">
              Tap POWER ON
            </p>
          </div>
        </div>
      </div>

      <main class="swiper">
        <div class="swiper-wrapper" id="mode-cards-container"></div>
      </main>

      <footer class="controls">
        <div class="button-group">
          <button id="btn-power-off" class="power-btn off" onclick="powerOff()">
            POWER OFF
          </button>
          <button id="btn-power-on" class="power-btn on" onclick="powerOn()">
            POWER ON
          </button>
        </div>

        <div class="system-status">
          <p>
            Power: <span id="status-text-power">OFF</span>
            <span id="status-dot">●</span>
          </p>
          <p>State: [<span id="status-text-state">STANDBY</span>]</p>
        </div>
      </footer>
    </div>

    <script>
      window.onload = async () => {
        await refreshCards();
      };

      async function refreshCards() {
        try {
          const response = await fetch("/api/get_modes");
          if (!response.ok) throw new Error("Network response was not ok");

          const data = await response.json();
          console.log("Received data:", data); // デバッグ用にログを出す

          // data がリストなのか、{"custom_modes": []} というオブジェクトなのかを判定
          const modes = Array.isArray(data) ? data : data.custom_modes || [];

          if (modes.length === 0) {
            console.warn("No modes found in data");
          }

          const container = document.getElementById("mode-cards-container");
          container.innerHTML = "";

          modes.forEach((mode) => {
            const slide = document.createElement("div");
            slide.className = "swiper-slide vibe-card";
            slide.setAttribute("data-mode-id", mode.id);

            slide.innerHTML = `
                <div class="vibe-content">
                    <p class="label">${mode.is_ai ? "AI Vibe" : "Custom Mode"}:</p>
                    <h2>${mode.name}</h2>
                </div>
                <div class="spotify-widget">
                    <div class="track-info">
                        <p id="playlist-name-${mode.id}">Ready</p>
                        <p>${mode.description || "Tap to start"}</p>
                    </div>
                </div>
            `;
            container.appendChild(slide);
          });

          if (swiper) swiper.update();
        } catch (err) {
          console.error("Failed to load modes:", err);
          const container = document.getElementById("mode-cards-container");
          container.innerHTML = `<p style="color: #ff4d4d; margin-top: 50px;">Failed to load modes. Please try again later.</p>`;
        }
      }
      async function powerOn() {
        const btnOn = document.getElementById("btn-power-on");
        const vibeName = document.getElementById("vibe-name");
        const albumArt = document.getElementById("album-art");

        if (btnOn) btnOn.disabled = true;
        if (vibeName) vibeName.innerText = "Syncing...";

        try {
          const response = await fetch("/api/update_vibe");
          const data = await response.json();

          if (data.status === "success") {
            if (vibeName) vibeName.innerText = data.vibe_name;

            if (data.spotify && data.spotify.album_art) {
              if (albumArt) {
                albumArt.src = data.spotify.album_art;
                albumArt.style.opacity = "1";
              }
              const pName = document.getElementById("playlist-name");
              const tDetails = document.getElementById("track-details");
              if (pName) pName.innerText = data.spotify.playlist || "Playing";
              if (tDetails)
                tDetails.innerText = `${data.spotify.track} • ${data.spotify.artist}`;
            }

            // 背景色の更新
            const [r, g, b] = data.rgb;
            document.body.style.background = `radial-gradient(circle at center, rgb(${r}, ${g}, ${b}) 0%, #000 120%)`;

            const powerText = document.getElementById("status-text-power");
            const dot = document.getElementById("status-dot");
            if (powerText) powerText.innerText = "ON";
            if (dot) dot.style.color = "#4ade80";

            const overlay = document.getElementById("power-overlay");
            if (overlay) overlay.style.opacity = "0";
          }
        } catch (error) {
          console.error("Fetch error:", error);
          if (vibeName) vibeName.innerText = "Error occurred";
        } finally {
          if (btnOn) btnOn.disabled = false;
        }
      }

      async function powerOff() {
        document.getElementById("power-overlay").style.opacity = "1";

        try {
          await fetch("/api/stop_vibe");
        } catch (e) {
          console.error("Failed to stop music");
        }
        document.getElementById("vibe-name").innerText = "Sleep Mode";
        document.getElementById("status-text-power").innerText = "OFF";
        document.getElementById("status-text-state").innerText = "STANDBY";
        document.getElementById("status-dot").style.color = "#666";
        document.getElementById("playlist-name").innerText = "Standby";
        document.getElementById("track-details").innerText =
          "Aimos is resting.";
        document.getElementById("album-art").style.opacity = "0";
        document.getElementById("album-art").src =
          "https://via.placeholder.com/50";

        document.body.style.background = "#000";
      }

      const swiper = new Swiper(".swiper", {
        effect: "cards",
        grabCursor: true,
        direction: "horizontal",
        on: {
          slideChange: function () {
            const stateText = document.getElementById("status-text-state");
            if (this.activeIndex === 0) {
              stateText.innerText = "AI MODE";
            } else {
              stateText.innerText = "STUDY MODE";
            }
          },
        },
      });
    </script>
  </body>
</html>
